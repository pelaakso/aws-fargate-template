name: Infra - update almost all dependencies

on:
  workflow_dispatch:

jobs:
  update-infra-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 4
    env:
      BRANCH_NAME: infra-deps-${{ github.run_id }}-${{ github.run_attempt }}
    defaults:
      run:
        shell: bash
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          version: 10

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: |
            infra/pnpm-lock.yaml

      - name: Install infra dependencies
        run: pnpm install

      - name: Create working branch
        run: |
          git checkout -b "$BRANCH_NAME"

      - name: Update dependencies
        run: |
          pnpm exec npm-check-updates -u
          pnpm install

      - name: Detect dependency changes
        id: detect_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "pelaakso@users.noreply.github.com"
          git config --local user.name "pelaakso"
          git commit -a -m "Deps/infra: update most infra dependencies"

      - name: Create configuration
        run: |
          cp bin/awsConfigExample.ts bin/awsConfig.ts

      - name: Test
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          pnpm run test

      - name: No dependency changes
        if: steps.detect_changes.outputs.has_changes != 'true'
        run: |
          printf '%s\n' 'No dependency updates found.'

      - name: Push changes
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          git push origin "$BRANCH_NAME"

      - name: Create pull request
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          gh pr create --base main --head "$BRANCH_NAME" --title "Deps/infra: update all infra dependencies" --body "Update all dependencies"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
